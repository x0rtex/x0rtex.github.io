<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="GoLatvia">
    <meta name="keywords" content="Latvia,Holiday,Vacation,Tourism,Attractions">
    <title>Contact</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <style>
        section p { margin-left: 138px; }
    </style>
</head>

<body>

    <header>
        <img id="logo" src="images/logo.png" alt="GoLatvia Logo">
        <h1 id="title">GoLatvia</h1>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="attractions.html">ATTRACTIONS</a></li>
                <li><a href="map.html">INTERACTIVE MAP</a></li>
                <li><a href="planner.html">PLAN YOUR TRIP</a></li>
                <li><a id="active" href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main style="
    background-image: url('https://i.imgur.com/xIC7ZpL.jpeg');
    background-color: rgba(44,36,36,.8);
    background-blend-mode: darken;
">
        <section>
            <h4 style="margin: 10px">Feel free to contact us about any enquiries you have!</h4>
            <form action="https://foo.com" method="get">
                <label for="first_name">First Name:<span class="required"> *</span></label>
                <input type="text" name="first_name" id="first_name" autofocus required><br>

                <label for="last_name">Last Name:<span class="required"> *</span></label>
                <input type="text" name="last_name" id="last_name" required><br>

                <label for="email">Email:<span class="required"> *</span></label>
                <input type="email" name="email" id="email" required placeholder="john.doe@example.com"><br>

                <label>Gender:</label><br>
                <input type="radio" name="gender" id="male" value="male"> <label for="male">Male</label><br>
                <input type="radio" name="gender" id="female" value="female"> <label for="female">Female</label><br>
                <input type="radio" name="gender" id="other" value="other"> <label for="other">Other</label><br>

                <fieldset>
                    <legend>How you heard about us:</legend>
                    <input type="checkbox" name="websearch" id="websearch" checked> <label for="websearch">Web Search</label><br>
                    <input type="checkbox" name="promo" id="promo"> <label for="promo">Promotion</label><br>
                    <input type="checkbox" name="friend" id="friend"> <label for="friend">Friend</label><br>
                </fieldset>

                <label for="message">Message:</label><br>
                <textarea name="message" id="message" cols="40" rows="6"></textarea><br>

                <input type="submit" name="submit" id="submit" value="Submit">
                <input type="reset" name="reset" id="reset">
            </form>

            <p><span class="required">*</span><em> indicates a required field </em></p>
        </section>

    </main>

    <footer>
        <p>&copy; Copyright 2024 - This is a university project website</p>
    </footer>

</body>

</html>
