    <meta charset="UTF-8">

    <meta name="keywords" content="Latvia,Holiday,Vacation,Tourism,Attractions">
    <title>Contact</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>

<body>

    <header>
        <img id="logo" src="images/logo.png" width="87px">
        <h1 style="float:left">GoLatvia</h1>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="attractions.html">ATTRACTIONS</a></li>
                <li><a href="map.html">INTERACTIVE MAP</a></li>
                <li><a href="planner.html">PLAN YOUR TRIP</a></li>
                <li><a id="active" href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section>
            <form action="http:/foo.com" method="post">
                <label for="first_name">First Name:<span class="required"> *</span></label>
                <input type="text" name="first_name" id="first_name" autofocus required><br>

                <label for="last_name">Last Name:<span class="required"> *</span></label>
                <input type="text" name="last_name" id="last_name" required><br>

                <label for="email">Email:<span class="required"> *</span></label>
                <input type="email" name="email" id="email" required placeholder="john.doe@example.com"><br>

                <label for="gender">Gender:</label>
                <input type="radio" name="gender" id="gender" value="male"> Male
                <input type="radio" name="gender" id="gender" value="female"> Female
                <input type="radio" name="gender" id="gender" value="other"> Other <br>

                <label for="heard">How you heard about us:</label>
                <fieldset>
                    <input type="checkbox" name="websearch" id="websearch" checked> Web Search <br>
                    <input type="checkbox" class="marginl" name="promo" id="promo"> Promotion <br>
                    <input type="checkbox" class="marginl" name="friend" id="friend"> Friend <br>
                </fieldset>
                <br>

                <label for="message">Message:</label>
                <textarea name="message" id="message" cols="40" rows="6"></textarea><br>

                <input type="submit" name="submit" id="button" value="Submit">
                <input type="reset" name="reset" id="reset">
            </form>
            <p style="margin-left: 138px;"><span class="required">*</span><em> indicates a required field </em></p>
        </section>

    </main>

    <footer>
        <section>
            <p>&copy; Copyright 2024</p>
        </section>
    </footer>

</body>

</html>
